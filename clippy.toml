# Determinism bans (decisions 0001 and 0005): iteration order and wall-clock
# time must never leak into worlds or artifacts. CI runs clippy with
# `-D warnings`, so these are compile-time errors. A justified exception gets
# a scoped `#[allow(clippy::disallowed_types)]` with a comment.
disallowed-types = [
    { path = "std::collections::HashMap", reason = "iteration order is nondeterministic; use BTreeMap (decision 0005)" },
    { path = "std::collections::HashSet", reason = "iteration order is nondeterministic; use BTreeSet (decision 0005)" },
    { path = "std::time::SystemTime", reason = "wall-clock time is forbidden; time is WorldTime (decision 0001)" },
    { path = "std::time::Instant", reason = "wall-clock time is forbidden; time is WorldTime (decision 0001)" },
]

# libm (decision 0028): std's f64 transcendentals dispatch to the *platform*
# libm (Apple's vs glibc's, last-ULP divergent); use hornvale_kernel::math,
# which routes through the portable libm crate. IEEE-exact operations (sqrt,
# abs, floor/ceil/round, mul_add, powi, arithmetic) remain allowed.
disallowed-methods = [
    { path = "f64::sin", reason = "platform libm diverges; use hornvale_kernel::math::sin" },
    { path = "f64::cos", reason = "platform libm diverges; use hornvale_kernel::math::cos" },
    { path = "f64::sin_cos", reason = "platform libm diverges; use hornvale_kernel::math::{sin, cos}" },
    { path = "f64::tan", reason = "platform libm diverges; use hornvale_kernel::math::tan" },
    { path = "f64::asin", reason = "platform libm diverges; use hornvale_kernel::math::asin" },
    { path = "f64::acos", reason = "platform libm diverges; use hornvale_kernel::math::acos" },
    { path = "f64::atan", reason = "platform libm diverges; use hornvale_kernel::math::atan" },
    { path = "f64::atan2", reason = "platform libm diverges; use hornvale_kernel::math::atan2" },
    { path = "f64::exp", reason = "platform libm diverges; use hornvale_kernel::math::exp" },
    { path = "f64::exp2", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::exp_m1", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::ln", reason = "platform libm diverges; use hornvale_kernel::math::ln" },
    { path = "f64::ln_1p", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::log", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::log2", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::log10", reason = "platform libm diverges; use hornvale_kernel::math::log10" },
    { path = "f64::powf", reason = "platform libm diverges; use hornvale_kernel::math::powf" },
    { path = "f64::sinh", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::cosh", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::tanh", reason = "platform libm diverges; use hornvale_kernel::math::tanh" },
    { path = "f64::asinh", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::acosh", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::atanh", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::cbrt", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
    { path = "f64::hypot", reason = "platform libm diverges; use hornvale_kernel::math (add a wrapper)" },
]
