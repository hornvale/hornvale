[package]
name = "hornvale"
version = "0.0.2"
edition = "2021"
categories = ["games"]
description = "An experimental open-world text adventure game"
exclude = [".github/", "assets/", "benches/", "crates/", "examples/", "tools/"]
keywords = ["game", "text-adventure", "open-world", "rust", "bevy"]
license = "Unlicense"
readme = "README.md"
homepage = "https://hornvale.github.io/book/"
repository = "https://github.com/hornvale/hornvale/"
documentation = "https://docs.rs/hornvale"
rust-version = "1.77.0"

[lib]
name = "hornvale"
path = "src/lib.rs"
test = false        # No unit tests for this library
doctest = false     # No doctests for this library

[[bin]]
name = "hornvale"
path = "src/main.rs"
test = false         # No unit tests for this binary
doctest = false      # No doctests for this binary

[lints]
workspace = true

[workspace]
exclude = []
members = ["core", "crates/*", "internal/*", "test/*"]

[workspace.lints.rustdoc]
bare_urls = "deny"
broken_intra_doc_links = "deny"
invalid_codeblock_attributes = "deny"
invalid_rust_codeblocks = "deny"
missing_crate_level_docs = "deny"
unescaped_backticks = "deny"

[workspace.lints.rust]
ambiguous_glob_imports = "deny"
ambiguous_glob_reexports = "deny"
bare_trait_objects = "deny"
const_item_mutation = "deny"
explicit_outlives_requirements = "deny"
let_underscore_drop = "deny"
meta_variable_misuse = "deny"
missing_copy_implementations = "deny"
missing_debug_implementations = "deny"
missing_docs = "deny"
non_ascii_idents = "deny"
# single_use_lifetimes = "deny"
trivial_casts = "deny"
trivial_numeric_casts = "deny"
unreachable_pub = "deny"
unsafe_code = "deny"
# unused_crate_dependencies = "deny"
unused_extern_crates = "deny"
unused_import_braces = "deny"
unused_lifetimes = "deny"
unused_qualifications = "deny"
variant_size_differences = "deny"

[dependencies]
anyhow.workspace = true
hornvale_astronomy.workspace = true
hornvale_command.workspace = true
hornvale_core.workspace = true
hornvale_input.workspace = true
hornvale_output.workspace = true
hornvale_scripting.workspace = true
hornvale_world.workspace = true
hornvale_world_commands.workspace = true

[dev-dependencies]
hornvale_test_utilities.workspace = true

[workspace.dependencies]
rand = "0.8.5"
all_asserts = "2.3.1"
anyhow = { version = "1.0.81", features = ["std", "backtrace"] }
assert_approx_eq = "1.1.0"
cpu-time = "1.0.0"
criterion = "0.5.1"
derivative = "2.2.0"
derive_builder = "0.20.0"
derive_more = "0.99.17"
getrandom = { version = "0.2.14", features = ["js"] }
hecs = { version = "0.10.4", features = [
  "std",
  "column-serialize",
  "row-serialize",
  "macros",
  "serde",
] }
hornvale_astronomy = { path = "crates/astronomy" }
hornvale_command = { path = "internal/command" }
hornvale_core = { path = "core" }
hornvale_input = { path = "internal/input" }
hornvale_output = { path = "internal/output" }
hornvale_scripting = { path = "internal/scripting" }
hornvale_test_utilities = { path = "test/test_utilities" }
hornvale_world = { path = "internal/world" }
hornvale_world_commands = { path = "internal/world_commands" }
log = "0.4.21"
paste = "1.0.14"
pretty_assertions = "1.4.0"
pretty_env_logger = "0.5.0"
regex = "1.10.4"
rstest = "0.19.0"
serde = { version = "1.0.197", features = ["alloc", "derive", "std"] }
serde_json = "1.0.114"
strum = { version = "0.26.2", features = ["derive"] }
tempfile = "3.10.1"
thiserror = "1.0.58"
