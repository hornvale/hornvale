[package]
name = "hornvale"
version = "0.1.0"
edition = "2021"
authors = ["Nathan Douglas <github@darkdell.net>"]
license = "Unlicense"
homepage = "https://hornvale.github.io/hornvale/"
repository = "https://github.com/hornvale/hornvale/"
documentation = "https://hornvale.github.io/hornvale/"
readme = "README.md"
keywords = ["hornvale"]
default-run = "hornvale"

[lib]
name = "hornvale"
path = "src/lib.rs"

[[bin]]
name = "hornvale"
path = "src/main.rs"

[build-dependencies]
convert_case = "0.6.0"

[dependencies]
hornvale_derive = { path = "derive" }
anyhow = { version = "1.0.75", features = ["backtrace"] }
derivative = "2.2.0"
derive_more = "0.99.17"
log = "0.4.20"
mockall = "0.11.4"
pretty_env_logger = "0.5.0"
regex = "1.9.5"
serde = { version = "1.0.188", features = ["derive"] }
serde_json = "1.0.107"
simplelog = "0.12.1"
thiserror = "1.0.49"
uuid = { version = "1.4.1", features = ["v4", "fast-rng"] }
serde_yaml = "0.9.25"
colored = "2.0.4"
tempfile = "3.8.0"
dirs = "5.0.1"
lazy_static = "1.4.0"
quadtree_rs = { version = "0.1.3", features = ["serde"] }
rand = "0.8.5"
rand_distr = "0.4.3"
rand_seeder = "0.2.3"
image = "0.24.7"
all_asserts = "2.3.1"
